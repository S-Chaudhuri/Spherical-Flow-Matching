# experiment_baseline.yaml

# OLD HEADLINE
# Baseline experiment sweep: geometry × dimensionality × curvature.
# Shared Single Gaussian setup (std=0.5, mean=[0, 0.5]), varying:
#   manifold  : euclidean, poincare, sphere
#   dim       : 2, 3
#   curvature : 1, 2, 3  (curved manifolds only)
# 14 configs. Naming: <manifold>_d<dim>_c<curvature>, e.g. poi_d2_c2.

#NEW HEADLINE
# Shared single-Gaussian setup.
# We keep std_x0 = std_x1 = 0.5 across all configs.
#
# Mean choice rationale:
# - Euclidean: choose a separation of 1.0, since the old 0.3 separation was too small relative to std=0.5.
# - Poincaré: start at the origin and use mean_x1 radius ≈ 0.4621, which gives a curvature-normalized
#   geodesic separation close to 1 across c = 1,2,3.
# - Sphere: means must lie exactly on the sphere of radius sqrt(1 / curvature). We place x0 at a pole
#   and x1 at geodesic distance 1 along a great circle, so target separation is comparable across curvatures.
#
# This way, the start distribution is as aligned as possible across curvature settings, while the two
# Gaussians remain sufficiently separated for a meaningful vector field to be learned.

# Euclidean
euc_d2: { manifold: euclidean, dim: 2, curvature: 0.0, std_x0: 0.3, std_x1: 0.3, mean_x0: [0.0, 0.0], mean_x1: [0.0, 1.0] }
euc_d3: { manifold: euclidean, dim: 3, curvature: 0.0, std_x0: 0.3, std_x1: 0.3, mean_x0: [0.0, 0.0, 0.0], mean_x1: [0.0, 1.0, 0.0] }

# Poincaré
poi_d2_c1: { manifold: poincare, dim: 2, curvature: 1.0, std_x0: 0.3, std_x1: 0.3, mean_x0: [0.0, 0.0], mean_x1: [0.0, 0.4621] }
poi_d2_c2: { manifold: poincare, dim: 2, curvature: 2.0, std_x0: 0.3, std_x1: 0.3, mean_x0: [0.0, 0.0], mean_x1: [0.0, 0.4621] }
poi_d2_c3: { manifold: poincare, dim: 2, curvature: 3.0, std_x0: 0.3, std_x1: 0.3, mean_x0: [0.0, 0.0], mean_x1: [0.0, 0.4621] }
poi_d3_c1: { manifold: poincare, dim: 3, curvature: 1.0, std_x0: 0.3, std_x1: 0.3, mean_x0: [0.0, 0.0, 0.0], mean_x1: [0.0, 0.4621, 0.0] }
poi_d3_c2: { manifold: poincare, dim: 3, curvature: 2.0, std_x0: 0.3, std_x1: 0.3, mean_x0: [0.0, 0.0, 0.0], mean_x1: [0.0, 0.4621, 0.0] }
poi_d3_c3: { manifold: poincare, dim: 3, curvature: 3.0, std_x0: 0.3, std_x1: 0.3, mean_x0: [0.0, 0.0, 0.0], mean_x1: [0.0, 0.4621, 0.0] }

# Sphere
# Radius is sqrt(1 / curvature), and means are chosen to lie exactly on that sphere.
# x0 is placed at a pole; x1 is placed at geodesic distance 1 along a great circle.
sph_d2_c1: { manifold: sphere, dim: 2, curvature: 1.0, std_x0: 0.3, std_x1: 0.3, mean_x0: [1.0, 0.0], mean_x1: [0.5403023, 0.8414710] }
sph_d2_c2: { manifold: sphere, dim: 2, curvature: 2.0, std_x0: 0.3, std_x1: 0.3, mean_x0: [0.7071068, 0.0], mean_x1: [0.1102688, 0.6984560] }
sph_d2_c3: { manifold: sphere, dim: 2, curvature: 3.0, std_x0: 0.3, std_x1: 0.3, mean_x0: [0.5773503, 0.0], mean_x1: [-0.0926974, 0.5698601] }
sph_d3_c1: { manifold: sphere, dim: 3, curvature: 1.0, std_x0: 0.3, std_x1: 0.3, mean_x0: [1.0, 0.0, 0.0], mean_x1: [0.5403023, 0.8414710, 0.0] }
sph_d3_c2: { manifold: sphere, dim: 3, curvature: 2.0, std_x0: 0.3, std_x1: 0.3, mean_x0: [0.7071068, 0.0, 0.0], mean_x1: [0.1102688, 0.6984560, 0.0] }
sph_d3_c3: { manifold: sphere, dim: 3, curvature: 3.0, std_x0: 0.3, std_x1: 0.3, mean_x0: [0.5773503, 0.0, 0.0], mean_x1: [-0.0926974, 0.5698601, 0.0] }