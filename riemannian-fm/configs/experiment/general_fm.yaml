data: general_fm
use_wandb: True

general:
  manifold: poincare
  curvature: 1.0
  dim: 2
  x0_dist: uniform
  x1_dist: normal
  n_samples: 20000
  std_x0: 0.7
  std_x1: 0.7

model:
  d_model: 512
  num_layers: 5
  actfn: swish
  fourier: null
  atol: 1e-6
  rtol: 1e-6
  metric_normalize: True

optim:
  num_iterations: 10000
  batch_size: 512
  val_batch_size: 2000
  lr: 1e-4

val_every: 500
div_mode: rademacher
eval_projx: False
local_coords: False
normalize_loglik: False
visualize: True